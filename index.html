<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Web MIDI DJ Controller</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #00e5ff;
            --accent-color-2: #ff0055;
            --text-color: #e0e0e0;
            --fader-bg: #0a0a0a;
            --fader-thumb: #333;
        }

        /* Reset & Touch Optimization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Prevents scrolling and panning */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header / MIDI Setup */
        header {
            background-color: #000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        select {
            background: #222;
            color: #fff;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 16px;
        }

        #midi-status {
            font-size: 14px;
            color: #ff3333;
        }
        #midi-status.connected { color: #33ff33; }

        /* Mixer Layout */
        .mixer {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        .channel {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .master {
            flex: 1.2;
            background: var(--panel-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .channel-title { margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; color: #888; }

        /* Knobs */
        .knobs-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 30px;
        }

        .knob-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .knob {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #3a3a3a 0%, #222 100%);
            border: 2px solid #111;
            position: relative;
            cursor: pointer;
            /* Default angle via CSS variable */
            --angle: 0deg; 
            transform: rotate(var(--angle));
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.1);
        }

        .knob-indicator {
            position: absolute;
            top: 5px;
            left: 50%;
            width: 4px;
            height: 15px;
            background: var(--accent-color);
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .knob-wrapper label { font-size: 12px; color: #aaa; }

        /* Faders */
        .fader-v, .fader-h {
            background: var(--fader-bg);
            position: relative;
            border-radius: 4px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            border: 1px solid #2a2a2a;
        }

        .fader-v {
            width: 40px;
            flex: 1;
            margin-bottom: 10px;
        }

        .fader-h {
            height: 50px;
            width: 90%;
            margin-bottom: 20px;
        }

        .thumb {
            position: absolute;
            background: var(--fader-thumb);
            border: 2px solid #555;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
        }
        
        /* Thumb styling with neon line */
        .thumb::after {
            content: '';
            position: absolute;
            background: var(--accent-color);
        }

        /* Vertical Thumb */
        .fader-v .thumb {
            width: 60px;
            height: 40px;
            left: -10px;
            /* Position handled via CSS Variable */
            bottom: calc(var(--pct, 50%) - 20px); 
        }
        .fader-v .thumb::after {
            width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%);
        }

        /* Horizontal Thumb */
        .fader-h .thumb {
            height: 70px;
            width: 30px;
            top: -10px;
            /* Position handled via CSS Variable */
            left: calc(var(--pct, 50%) - 15px);
        }
        .fader-h .thumb::after {
            height: 100%; width: 2px; left: 50%; top: 0; transform: translateX(-50%); background: var(--accent-color-2);
        }

        /* Pads / Buttons */
        .pads-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .pad {
            width: 80px;
            height: 60px;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #111;
            transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pad.active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #111, 0 0 15px var(--accent-color-2);
            background: #444;
            border-color: var(--accent-color-2);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>WebMIDI DJ</h2>
        </div>
        <div>
            <select id="midi-out-select">
                <option value="">No MIDI Output Selected</option>
            </select>
            <span id="midi-status">● Disconnected</span>
        </div>
    </header>

    <div class="mixer">
        <div class="channel">
            <div class="channel-title">CH 1</div>
            <div class="knobs-container">
                <div class="knob-wrapper">
                    <div class="knob" data-cc="10" data-val="64" data-type="knob"><div class="knob-indicator"></div></div>
                    <label>HIGH</label>
                </div>
                <div class="knob-wrapper">
                    <div class="knob" data-cc="11" data-val="64" data-type="knob"><div class="knob-indicator"></div></div>
                    <label>MID</label>
                </div>
                <div class="knob-wrapper">
                    <div class="knob" data-cc="12" data-val="64" data-type="knob"><div class="knob-indicator"></div></div>
                    <label>LOW</label>
                </div>
            </div>
            <div class="fader-v" data-cc="7" data-val="100" data-type="fader-v">
                <div class="thumb"></div>
            </div>
        </div>

        <div class="master">
            <div class="channel-title" style="color: var(--accent-color-2)">MASTER</div>
            
            <div class="pads-container">
                <div class="pad" data-cc="20" data-type="pad">SFX 1</div>
                <div class="pad" data-cc="21" data-type="pad">SFX 2</div>
            </div>

            <div style="flex:1"></div>

            <div class="fader-h" data-cc="1" data-val="64" data-type="fader-h">
                <div class="thumb"></div>
            </div>
        </div>

        <div class="channel">
            <div class="channel-title">CH 2</div>
            <div class="knobs-container">
                <div class="knob-wrapper">
                    <div class="knob" data-cc="14" data-val="64" data-type="knob"><div class="knob-indicator"></div></div>
                    <label>HIGH</label>
                </div>
                <div class="knob-wrapper">
                    <div class="knob" data-cc="15" data-val="64" data-type="knob"><div class="knob-indicator"></div></div>
                    <label>MID</label>
                </div>
                <div class="knob-wrapper">
                    <div class="knob" data-cc="16" data-val="64" data-type="knob"><div class="knob-indicator"></div></div>
                    <label>LOW</label>
                </div>
            </div>
            <div class="fader-v" data-cc="13" data-val="100" data-type="fader-v">
                <div class="thumb"></div>
            </div>
        </div>
    </div>

    <script>
        // --- MIDI SETUP ---
        let midiAccess = null;
        let activeOutput = null;
        const midiSelect = document.getElementById('midi-out-select');
        const midiStatus = document.getElementById('midi-status');

        async function initMIDI() {
            try {
                if (!navigator.requestMIDIAccess) {
                    throw new Error("Web MIDI API not supported in this browser.");
                }
                midiAccess = await navigator.requestMIDIAccess();
                
                populateMIDIOutputs();
                midiAccess.onstatechange = populateMIDIOutputs;
                
                midiStatus.textContent = "● API Ready";
                midiStatus.classList.add('connected');
            } catch (err) {
                midiStatus.textContent = "● Error: No MIDI";
                console.error("MIDI Init Error:", err);
                alert("MIDI API not available. On iOS, ensure you are using a Web MIDI compatible browser app.");
            }
        }

        function populateMIDIOutputs() {
            if (!midiAccess) return;
            midiSelect.innerHTML = '<option value="">Select MIDI Output...</option>';
            const outputs = Array.from(midiAccess.outputs.values());
            
            outputs.forEach(output => {
                const option = document.createElement('option');
                option.value = output.id;
                option.textContent = output.name;
                midiSelect.appendChild(option);
            });

            // Auto-select if there is exactly 1 output available
            if (outputs.length === 1 && !activeOutput) {
                midiSelect.value = outputs[0].id;
                selectMIDIOutput(outputs[0].id);
            }
        }

        function selectMIDIOutput(id) {
            if (!midiAccess) return;
            activeOutput = midiAccess.outputs.get(id) || null;
            if (activeOutput) {
                midiStatus.textContent = `● Connected`;
            } else {
                midiStatus.textContent = "● Disconnected";
            }
        }

        midiSelect.addEventListener('change', (e) => selectMIDIOutput(e.target.value));

        function sendCC(cc, value) {
            if (activeOutput) {
                // 0xB0 is Control Change on MIDI Channel 1
                activeOutput.send([0xB0, parseInt(cc), parseInt(value)]);
            }
        }

        // --- UI & TOUCH LOGIC ---
        function updateUI(el, val) {
            el.dataset.val = val;
            const type = el.dataset.type;

            if (type === 'knob') {
                // Map 0-127 to -135deg to 135deg
                const angle = -135 + (val / 127) * 270;
                el.style.setProperty('--angle', `${angle}deg`);
            } else if (type === 'fader-v' || type === 'fader-h') {
                const pct = (val / 127) * 100;
                el.style.setProperty('--pct', `${pct}%`);
            }
        }

        // Initialize UI values on load
        document.querySelectorAll('[data-val]').forEach(el => {
            updateUI(el, parseInt(el.dataset.val));
        });

        // Event Handling variables
        let activeElement = null;
        let startY = 0;
        let startVal = 0;

        // KNOBS (Vertical Drag logic)
        document.querySelectorAll('.knob').forEach(knob => {
            knob.addEventListener('pointerdown', (e) => {
                activeElement = knob;
                knob.setPointerCapture(e.pointerId);
                startY = e.clientY;
                startVal = parseInt(knob.dataset.val);
            });

            knob.addEventListener('pointermove', (e) => {
                if (activeElement !== knob) return;
                const deltaY = startY - e.clientY;
                // Sensitivity multiplier (lower = slower turning)
                const sensitivity = 0.8; 
                let newVal = Math.max(0, Math.min(127, startVal + (deltaY * sensitivity)));
                
                newVal = Math.round(newVal);
                if (newVal !== parseInt(knob.dataset.val)) {
                    updateUI(knob, newVal);
                    sendCC(knob.dataset.cc, newVal);
                }
            });

            knob.addEventListener('pointerup', (e) => { activeElement = null; });
            knob.addEventListener('pointercancel', (e) => { activeElement = null; });
        });

        // VERTICAL FADERS
        document.querySelectorAll('.fader-v').forEach(fader => {
            function handleFaderMove(e) {
                const rect = fader.getBoundingClientRect();
                let y = e.clientY - rect.top;
                y = Math.max(0, Math.min(rect.height, y)); // Clamp bounds
                const pct = 1 - (y / rect.height); // Invert: bottom=0, top=1
                const val = Math.round(pct * 127);
                
                if (val !== parseInt(fader.dataset.val)) {
                    updateUI(fader, val);
                    sendCC(fader.dataset.cc, val);
                }
            }

            fader.addEventListener('pointerdown', (e) => {
                activeElement = fader;
                fader.setPointerCapture(e.pointerId);
                handleFaderMove(e);
            });

            fader.addEventListener('pointermove', (e) => {
                if (activeElement === fader) handleFaderMove(e);
            });

            fader.addEventListener('pointerup', () => { activeElement = null; });
            fader.addEventListener('pointercancel', () => { activeElement = null; });
        });

        // HORIZONTAL FADERS
        document.querySelectorAll('.fader-h').forEach(fader => {
            function handleFaderMoveH(e) {
                const rect = fader.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(rect.width, x));
                const pct = x / rect.width;
                const val = Math.round(pct * 127);
                
                if (val !== parseInt(fader.dataset.val)) {
                    updateUI(fader, val);
                    sendCC(fader.dataset.cc, val);
                }
            }

            fader.addEventListener('pointerdown', (e) => {
                activeElement = fader;
                fader.setPointerCapture(e.pointerId);
                handleFaderMoveH(e);
            });

            fader.addEventListener('pointermove', (e) => {
                if (activeElement === fader) handleFaderMoveH(e);
            });

            fader.addEventListener('pointerup', () => { activeElement = null; });
            fader.addEventListener('pointercancel', () => { activeElement = null; });
        });

        // ONE-SHOT BUTTONS / PADS
        document.querySelectorAll('.pad').forEach(pad => {
            pad.addEventListener('pointerdown', (e) => {
                pad.setPointerCapture(e.pointerId);
                pad.classList.add('active');
                sendCC(pad.dataset.cc, 127);
            });

            pad.addEventListener('pointerup', (e) => {
                pad.classList.remove('active');
                sendCC(pad.dataset.cc, 0); // Send 0 on release (momentary behavior)
            });
            
            pad.addEventListener('pointercancel', (e) => {
                pad.classList.remove('active');
                sendCC(pad.dataset.cc, 0);
            });
        });

        // Start MIDI system
        window.addEventListener('load', initMIDI);
    </script>
</body>
</html>
